name: Check media files

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify-media-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify media references
        run: python check_media.py .
