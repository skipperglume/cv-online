name: Check HTML files presence

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify-html-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure required HTML files exist
        run: |
          required_files=(
            "index.html"
            "contact.html"
            "hobbies.html"
            "main-work.html"
          )

          missing=0

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: $file is missing at the repository root."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Success: all required HTML files exist."